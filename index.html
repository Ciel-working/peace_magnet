<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平兌換券</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        /* ══ 色系變數 ══ */
        #magnet-card {
            --accent:      #2D5A3D;
            --accent-mid:  #4A7C5F;
            --accent-lt:   #A8C5B0;
            --accent-pale: #D4E8DA;
            --card-bg:     #F2EFE4;
            --shaded:      rgba(168,197,176,0.25);
            --border-col:  #1A2E20;
            --row-div:     #C5CCBE;
        }
        #magnet-card.caramel {
            --accent:      #8B4A1C;
            --accent-mid:  #B5672E;
            --accent-lt:   #D4A574;
            --accent-pale: #EDD9C0;
            --card-bg:     #F5EEE4;
            --shaded:      rgba(212,165,116,0.2);
            --border-col:  #3D1F0A;
            --row-div:     #CFC0A8;
        }
        #magnet-card.charcoal {
            --accent:      #2C2C2C;
            --accent-mid:  #4A4A4A;
            --accent-lt:   #9A9A9A;
            --accent-pale: #D4D4D4;
            --card-bg:     #F0EDE6;
            --shaded:      rgba(154,154,154,0.15);
            --border-col:  #1A1A1A;
            --row-div:     #C0BCBA;
        }
        #magnet-card.rust {
            --accent:      #8B3A1A;
            --accent-mid:  #A84E28;
            --accent-lt:   #C47A5A;
            --accent-pale: #E8C4A8;
            --card-bg:     #F4EDE6;
            --shaded:      rgba(196,122,90,0.18);
            --border-col:  #3D1A0A;
            --row-div:     #CCBAA8;
        }

        #magnet-card {
            width: 13.5cm;
            height: 8.25cm;
            position: relative;
            overflow: hidden;
            background: var(--card-bg);
            border: 3px solid var(--border-col);
            box-shadow: 0 36px 96px rgba(0,0,0,0.55);
            display: flex;
            transition: all 0.35s ease;
        }
        #magnet-card::after {
            content: '';
            position: absolute;
            inset: 9px;
            border: 1.5px solid var(--border-col);
            border-top-right-radius: 35px;
            pointer-events: none;
            z-index: 30;
        }

        /* 左面板 */
        .left-panel {
            width: 3.45cm;
            background: var(--accent);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0 12px;
            position: relative;
            transition: background 0.35s ease;
        }
        .left-panel .dot-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, var(--accent-mid) 1.5px, transparent 1.5px);
            background-size: 19.5px 19.5px;
            background-position: 9px 9px;
            opacity: 0.5;
        }
        .hero-char {
            font-family: 'Noto Serif TC', serif;
            font-weight: 900;
            font-size: 45px;
            line-height: 1;
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .peace-sym {
            position: relative;
            z-index: 1;
        }

        /* 右面板 */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            min-width: 0;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .write-bg {
            background-color: #FFFFFF; 
            padding-inline: 5px;
        }
        .tag-box {
            display: flex;
            gap: 3px;
        }
        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.08em;
            transition: border-color 0.35s, color 0.35s;
        }
        .date-txt {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.1em;
        }
        .main-title {
            font-family: 'Noto Serif TC', serif;
            font-weight: 900;
            font-size: 25.5px;
            color: var(--border-col);
            line-height: 1;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 9.5px;
            transition: color 0.35s;
        }
        .sub-title {
            font-size: 11px;
            color: #9A9590;
            text-align: center;
            letter-spacing: 0.06em;
        }
        .double-rule {
            border-top: 2.2px solid var(--border-col);
            padding-top: 3px;
            border-bottom: 1.5px solid var(--border-col);
            margin-bottom: 0;
            transition: border-color 0.35s;
        }
        .fields {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .field-row {
            flex: 1;
            display: flex;
            align-items: center;
            border-bottom: 1.5px solid var(--row-div);
            min-height: 0;
            transition: background 0.35s, border-color 0.35s;
        }
        .field-row:last-child { border-bottom: none; }
        .field-row.shaded { background: var(--shaded); }
        .f-label {
            font-size: 14px;
            color: var(--accent-mid);
            flex-shrink: 0;
            padding: 0 7.5px;
            line-height: 1.3;
            font-weight: 500;
            transition: color 0.35s;
        }
        .f-div {
            width: 1.5px;
            align-self: stretch;
            margin: 6px 0;
            background: var(--row-div);
            flex-shrink: 0;
        }
        .f-val {
            font-size: 14.2px;
            color: var(--border-col);
            font-weight: 700;
            padding: 0 10.5px;
            line-height: 1.4;
        }
        .f-val-list {
            display: flex;
            flex-direction: column;
            padding: 3px 10.5px;
            gap: 1.5px;
        }
        .f-val-list span {
            font-size: 14.2px;
            color: var(--border-col);
            font-weight: 700;
            line-height: 1.4;
        }
        .bottom-bar {
            border-top: 2.2px solid var(--border-col);
            padding-top: 3px;
            border-bottom: 1.5px solid var(--border-col);
            margin-top: 3px;
            margin-bottom: 3px;
            transition: border-color 0.35s;
        }
        .fine-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-block: 10px;
        }

        /* 角落 */
        .cm { position: absolute; width: 21px; height: 21px; z-index: 31; }
        .cm::before { content:''; position:absolute; background:var(--accent); width:21px; height:1.5px; top:0; left:0; transition: background 0.35s; }
        .cm::after  { content:''; position:absolute; background:var(--accent); width:1.5px; height:21px; top:0; left:0; transition: background 0.35s; }
        .cm.tl { top:12px; left:12px; }
        .cm.tr { top:12px; right:12px; transform:scaleX(-1); }
        .cm.bl { bottom:12px; left:12px; transform:scaleY(-1); }
        .cm.br { bottom:12px; right:12px; transform:scale(-1,-1); }


        /* ── 粉嫩系 ── */
        #magnet-card.berry {
            --accent:      #6B2D5E;
            --accent-mid:  #8F4A7A;
            --accent-lt:   #C48AB0;
            --accent-pale: #E8CCE0;
            --card-bg:     #F7F0F5;
            --shaded:      rgba(196,138,176,0.18);
            --border-col:  #3A1230;
            --row-div:     #D4BECE;
        }
        #magnet-card.rose {
            --accent:      #9E4A5A;
            --accent-mid:  #B86070;
            --accent-lt:   #D4959A;
            --accent-pale: #EDCDD0;
            --card-bg:     #F7F0F0;
            --shaded:      rgba(212,149,154,0.18);
            --border-col:  #4A1A22;
            --row-div:     #D4BCBE;
        }
        #magnet-card.denim {
            --accent:      #3A5270;
            --accent-mid:  #4E6E8A;
            --accent-lt:   #8AAAB8;
            --accent-pale: #C8D8E4;
            --card-bg:     #EFF2F5;
            --shaded:      rgba(138,170,184,0.18);
            --border-col:  #18283A;
            --row-div:     #B8C8D4;
        }
        /* ── 復古印刷系 ── */
        #magnet-card.sage {
            --accent:      #4A6054;
            --accent-mid:  #6A8070;
            --accent-lt:   #9AB8A4;
            --accent-pale: #CCDDD4;
            --card-bg:     #F0F2EE;
            --shaded:      rgba(154,184,164,0.18);
            --border-col:  #1E2E26;
            --row-div:     #B8C8BC;
        }
        #magnet-card.cream {
            --accent:      #8A7040;
            --accent-mid:  #A89060;
            --accent-lt:   #C8B080;
            --accent-pale: #E8D8B0;
            --card-bg:     #FAF6EC;
            --shaded:      rgba(200,176,128,0.2);
            --border-col:  #3A2C10;
            --row-div:     #D0C4A0;
        }
        #magnet-card.lavender {
            --accent:      #6A5A8A;
            --accent-mid:  #8A78A8;
            --accent-lt:   #B4A8CC;
            --accent-pale: #DDD8EE;
            --card-bg:     #F4F2F8;
            --shaded:      rgba(180,168,204,0.18);
            --border-col:  #2E2240;
            --row-div:     #C8C0DC;
        }
        /* ── 意外好看系 ── */
        #magnet-card.navy {
            --accent:      #1E3A5A;
            --accent-mid:  #2E5080;
            --accent-lt:   #7090B8;
            --accent-pale: #BCD0E4;
            --card-bg:     #EEF2F6;
            --shaded:      rgba(112,144,184,0.15);
            --border-col:  #0A1828;
            --row-div:     #B0C4D8;
        }
        #magnet-card.cocoa {
            --accent:      #5A3428;
            --accent-mid:  #7A4E40;
            --accent-lt:   #A87868;
            --accent-pale: #D8B8A8;
            --card-bg:     #F5EDE8;
            --shaded:      rgba(168,120,104,0.18);
            --border-col:  #2A1410;
            --row-div:     #C8AEA4;
        }
        #magnet-card.olive {
            --accent:      #5A5A28;
            --accent-mid:  #787840;
            --accent-lt:   #AAAA70;
            --accent-pale: #D4D4A0;
            --card-bg:     #F2F2E8;
            --shaded:      rgba(170,170,112,0.18);
            --border-col:  #282810;
            --row-div:     #C4C4A0;
        }
        /* 色系切換按鈕 */
        .swatch-btn {
            width: 100%;
            height: 30px;
            border-radius: 6px;
            border: 2.5px solid transparent;
            cursor: pointer;
            transition: all 0.18s;
            outline: none;
            display: block;
        }
        .swatch-btn:hover { transform: scale(1.12); }
        .swatch-btn.active { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: 13.5cm 8.25cm; margin: 0; }
            body { background: none !important; display: block !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            #magnet-card { box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; }
        }
    </style>
</head>

            <div class="main-title">和平兌換券</div>
            <div class="sub-title mt-1">不是誰的錯，是這份工作的錯</div>

            <div class="double-rule" style="margin-top: 15px;"></div>
            <div class="fields">
                <div class="field-row shaded">
                    <span class="f-label">兌換內容</span>
                    <span class="f-div"></span>
                    <span class="f-val" id="disp-content">飲料一杯，飲料店任選</span>
                </div>
                <div class="field-row">
                    <span class="f-label">注意事項</span>
                    <span class="f-div"></span>
                    <div class="f-val-list" id="disp-count">
                        <span>．效期直至任一方徹底翻臉為止</span>

                <div class="tag-box">
                    <div class="tag">peace</div>
                    <div class="tag">-</div>
                    <div class="tag write-bg" id="disp-issuer">L413</div>
                    <div class="tag">-</div>
                    <div class="tag write-bg" id="disp-receiver">L398</div>
                </div>
                <div class="date-txt write-bg" id="disp-date">2026.06.29</div>
            </div>
        </div>
    </div>
    <!-- <p class="no-print text-xs text-slate-500 mt-5">列印設定：去掉頁首頁尾 · 紙張自訂 13.5×8.25cm</p> -->
    <p class="no-print text-xs text-slate-500">畫面為實際大小</p>
    </div>

    <script>
        // 大頭貼上傳
        const themeLabels = {green:'墨綠',caramel:'焦糖',charcoal:'炭黑',rust:'磚紅',berry:'莓果紫',rose:'玫瑰粉',denim:'煙燻藍',sage:'鼠尾草',cream:'奶油黃',lavender:'薰衣草',navy:'深海藍',cocoa:'可可棕',olive:'橄欖'};
        const avatarInput = document.getElementById('inp-avatar');
        const avatarPreview = document.getElementById('avatar-preview');
        const cardAvatar = document.getElementById('card-avatar');

        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const src = e.target.result;
                avatarPreview.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover;object-position:center 20%;">`;
                cardAvatar.src = src;
            };
            reader.readAsDataURL(file);
        });

        function resetAvatar() {
            avatarInput.value = '';
            avatarPreview.innerHTML = '<span style="font-size:22px;justify-items: center;">🙂</span>';
            // restore original base64 — reload from card's data-original
            cardAvatar.src = cardAvatar.dataset.original;
        }

        // store original src on load
        cardAvatar.dataset.original = cardAvatar.src;

        function bind(inpId, dispId) {
            const inp = document.getElementById(inpId);
            const disp = document.getElementById(dispId);
            inp.addEventListener('input', () => { disp.textContent = inp.value; });
        }
        bind('inp-content', 'disp-content');
        bind('inp-fine',    'disp-fine');

        // textarea → 逐行更新卡片
        const countTA = document.getElementById('inp-count');
        const countDisp = document.getElementById('disp-count');
        function updateCount() {
            const lines = countTA.value.split('\n').filter(l => l.trim() !== '');
            countDisp.innerHTML = lines.map(l => `<span>${l}</span>`).join('');
        }
        countTA.addEventListener('input', updateCount);

        function updateBarcode() {
            const issuerEl = document.getElementById('inp-issuer');
            const receiverEl = document.getElementById('inp-receiver');
            const i = (issuerEl ? issuerEl.value.trim() : '') || '';
            const r = (receiverEl ? receiverEl.value.trim() : '') || '';
            document.getElementById('disp-issuer').textContent = i;
            document.getElementById('disp-receiver').textContent = r;
        }
        document.getElementById('inp-issuer').addEventListener('input', updateBarcode);
        document.getElementById('inp-issuer').addEventListener('change', updateBarcode);
        document.getElementById('inp-receiver').addEventListener('input', updateBarcode);
        document.getElementById('inp-receiver').addEventListener('change', updateBarcode);

        function formatDate(v) {
            if (!v) return '';
            const [y,m,d] = v.split('-');
            return `${y}.${m}.${d}`;
        }
        const di = document.getElementById('inp-date');
        const today = new Date().toISOString().slice(0,10);
        di.value = today;
        document.getElementById('disp-date').textContent = formatDate(today);
        di.addEventListener('change', e => {
            document.getElementById('disp-date').textContent = formatDate(e.target.value);
        });

        function setTheme(t) {
            const card = document.getElementById('magnet-card');
            card.className = t === 'green' ? '' : t;
            ['green','caramel','charcoal','rust','berry','rose','denim','sage','cream','lavender','navy','cocoa','olive'].forEach(k => {
                document.getElementById('btn-' + k).classList.toggle('active', k === t);
            });
            document.getElementById('theme-label').textContent = themeLabels[t] || t;
        }

        async function downloadCard() {
            const btn = document.getElementById('download-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 截圖中...';

            try {
                // 等字型載入完成
                await document.fonts.ready;

                const card = document.getElementById('magnet-card');

                const canvas = await html2canvas(card, {
                    scale: 3,
                    useCORS: false,
                    allowTaint: true,
                    foreignObjectRendering: false,
                    logging: false,
                    onclone: (doc) => {
                        doc.querySelectorAll('img').forEach(img => {
                            if (img.src.startsWith('data:')) return;
                            const c = document.createElement('canvas');
                            c.width = img.naturalWidth || img.width;
                            c.height = img.naturalHeight || img.height;
                            c.getContext('2d').drawImage(img, 0, 0);
                            try { img.src = c.toDataURL(); } catch(e) {}
                        });
                    }
                });

                const issuer = document.getElementById('inp-issuer').value.trim() || 'unknown';
                const receiver = document.getElementById('inp-receiver').value.trim() || 'unknown';
                const filename = `peace_magnet_${issuer}_${receiver}.png`;

                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = filename;
                a.click();

                btn.textContent = '✅ 下載成功！';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '💾 下載卡片';
                }, 2000);
            } catch (e) {
                console.error(e);
                btn.disabled = false;
                btn.textContent = '💾 下載卡片';
                alert('截圖失敗：' + e.message);
            }
        }
    </script>
